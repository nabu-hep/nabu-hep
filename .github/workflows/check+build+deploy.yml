name: Check/Build/Deploy

on:
  release:
    types: [published]
  push:
    branches: ["releases/**"]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check on ${{ matrix.os }} with ${{ matrix.environment }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        environment: ["py310", "py311", "py312"]
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6
    - name: Set up pixi
      uses: prefix-dev/setup-pixi@v0.9.6
      with:
        pixi-version: v0.70.2
        environments: ${{ matrix.environment }}
        frozen: true
    - name: Test the CLI script
      run: pixi run -e ${{ matrix.environment }} fit-test-artifacts
    - name: Test with pytest
      # Run the test suite even if the CLI smoke test above failed, so both are
      # always reported. The job still fails if either step fails.
      if: ${{ !cancelled() }}
      run: pixi run -e ${{ matrix.environment }} pytest

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout git repository
        uses: actions/checkout@v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.2
          environments: py312
          frozen: true

      - name: Build NABU wheel
        run: pixi run -e py312 build

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: ./dist/*.whl

  deploy:
    name: Deploy to PyPI
    if: ${{ github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/release') }}
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/nabu-hep/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel
          merge-multiple: true
          path: dist

      - name: Debug
        run: ls -l dist

      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
         user:     ${{ secrets.TWINE_USERNAME }}
         password: ${{ secrets.TWINE_PASSWORD }}
         skip-existing: true
